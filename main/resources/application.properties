spring.application.name=Farmcare

# Thymeleaf configuration
spring.thymeleaf.cache=false
spring.thymeleaf.suffix=.html
spring.thymeleaf.prefix=classpath:/templates/

# Server configuration
server.port=8080

# Primary DB settings for the app's DAO layer (see DatabaseConnection).
# This uses the SQLite file under the project working directory.
farmcare.db.url=jdbc:sqlite:data/farmcare.db
farmcare.db.user=
farmcare.db.password=

# Spring-style datasource settings (kept for compatibility/tools).
spring.datasource.url=jdbc:sqlite:data/farmcare.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
